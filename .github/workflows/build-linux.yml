name: Build Linux

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module InvokeBuild -Scope CurrentUser -Force -AllowClobber

      - name: Setup cargo-bundle-licenses
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          cargo install --locked cargo-bundle-licenses

      - name: Run Build task
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Invoke-Build Build

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module InvokeBuild -Scope CurrentUser -Force -AllowClobber

      - name: Run Test task
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Invoke-Build Test
