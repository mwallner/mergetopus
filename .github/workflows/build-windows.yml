name: Build Windows

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  pack-windows:
    name: Pack (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module InvokeBuild -Scope CurrentUser -Force -AllowClobber

      - name: Setup cargo-bundle-licenses
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          cargo install --locked cargo-bundle-licenses

      - name: Run Build + Test task
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Invoke-Build Build,Test

      - name: Run Pack task
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Invoke-Build Pack

      - name: Collect build artifacts
        if: always()
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          $artifactDir = 'artifacts'
          New-Item -Path $artifactDir -ItemType Directory -Force | Out-Null

          Get-ChildItem -Path target -Filter 'mergetopus.*.nupkg' -File -ErrorAction SilentlyContinue |
            Copy-Item -Destination $artifactDir -Force

          $releaseFiles = Get-ChildItem -Path target -Recurse -File -Filter 'mergetopus.*' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '[\\/]release[\\/]' }

          if ($releaseFiles) {
            Compress-Archive -Path $releaseFiles.FullName -DestinationPath "$artifactDir/release-mergetopus-${{ runner.os }}.zip" -Force
          }
          else {
            Write-Host 'No release mergetopus.* files found to zip.'
          }

          if (Test-Path './target/release/mergetopus.exe') {
            $hash = Get-FileHash './target/release/mergetopus.exe' -Algorithm SHA256
            "$($hash.Hash.ToLower())  mergetopus.exe" | Out-File -FilePath "$artifactDir/mergetopus.exe.sha256" -Encoding ascii
          }
          else {
            Write-Host 'No target/release/mergetopus.exe file found to checksum.'
          }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pack-${{ runner.os }}
          path: |
            artifacts/*.nupkg
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: warn
